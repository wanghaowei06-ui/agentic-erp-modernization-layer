openapi: 3.0.3
info:
  title: Generated Purchase Order API Facade
  version: 0.1.0
  description: >
    Draft API candidate for manual_investigation approval-task creation.
    This contract is for human review only and is not registered for
    trusted-tool execution.
servers:
  - url: http://localhost:8003
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service health
  /api/purchase-orders/{po_id}/approval-request:
    post:
      summary: Create a human approval task for manual investigation
      description: >
        Accepts a purchase order ID, creates or reuses a pending human approval
        task, writes an audit log entry, and returns 202 Accepted with task_id.
        It does not update purchase order business state.
      parameters:
        - name: po_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalRequest"
      responses:
        "202":
          description: Approval task accepted for human review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTaskResponse"
        "404":
          description: Purchase order not found
components:
  schemas:
    ApprovalRequest:
      type: object
      required:
        - approval_reason
        - manager_id
        - source_case_id
      properties:
        approval_reason:
          type: string
          example: Amount exceeds budget limit
        manager_id:
          type: string
          example: MGR-001
        source_case_id:
          type: string
          example: CASE-001
        case_id:
          type: string
          nullable: true
          example: CASE-SIM-001
        correlation_id:
          type: string
          nullable: true
          example: corr-manual-investigation-001
    ApprovalTaskResponse:
      type: object
      required:
        - po_id
        - task_id
        - status
        - business_action
        - process_signature
        - audit_log_created
        - source_case_id
        - business_side_effects
        - evidence_run_ids
        - observed_count
      properties:
        po_id:
          type: string
          example: PO-1001
        task_id:
          type: string
          example: TASK-PO-1001-APPROVAL
        status:
          type: string
          example: PENDING_HUMAN_APPROVAL
        business_action:
          type: string
          example: manual_investigation
        process_signature:
          type: string
          example: manual_investigation__budget_exceeded__waiting_for_human_approval__require_human_approval__no_side_effects
        audit_log_created:
          type: boolean
          example: true
        source_case_id:
          type: string
          example: CASE-001
        business_side_effects:
          type: array
          items:
            type: string
          example: []
        evidence_run_ids:
          type: array
          items:
            type: string
          example:
            - RUN-20260630-001
            - RUN-20260630-002
            - RUN-20260630-003
            - RUN-20260630-004
        observed_count:
          type: integer
          example: 4
